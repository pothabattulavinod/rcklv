<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Search Rice Card</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
    a { color: #0d6efd; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <h1 class="mb-4 text-center">Search Rice Card</h1>

  <!-- Counters -->
  <div class="row mb-3 text-center">
    <div class="col-md-6">
      <div class="alert alert-primary">
        <strong>Total Cards: </strong><span id="totalCards">0</span>
      </div>
    </div>
    <div class="col-md-6">
      <div class="alert alert-danger">
        <strong>Pending Cards: </strong><span id="pendingCards">0</span>
      </div>
    </div>
  </div>

  <!-- ✅ Select Filter -->
  <div class="mb-3">
    <select id="statusFilter" class="form-select form-select-lg">
      <option value="all">Show All</option>
      <option value="done">Done</option>
      <option value="pending">Not Done</option>
    </select>
  </div>

  <div class="mb-3">
    <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search by CARDNO, Name, or Status" disabled>
  </div>

  <div class="table-responsive">
    <table id="resultsTable" class="table table-bordered table-striped" style="display:none;">
      <thead class="table-light">
        <tr>
          <th>CARDNO</th>
          <th>HEAD OF THE FAMILY</th>
          <th>UNITS</th>
          <th>TRANSACTION STATUS</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let jsonData = [];
let trnsData = [];
let currentFilter = 'all';

const jsonFiles = [
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/11APR.json',
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/40APR.json',
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/12APR.json'
];

const trnsFiles = [
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/11trns_current.json',
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/12trns_current.json',
'https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/40trns_current.json'
];

Promise.all(jsonFiles.map(file => fetch(file).then(res => res.json())))
.then(results => {
  jsonData = results.flat();
  return Promise.all(trnsFiles.map(file => fetch(file).then(res => res.json())));
})
.then(trnsResults => {
  trnsData = trnsResults.flat();
  document.getElementById('searchInput').disabled = false;
  filterResults();
})
.catch(err => alert("Failed to load JSON files: " + err));

document.getElementById('searchInput').addEventListener('input', filterResults);

// ✅ Dropdown change
document.getElementById('statusFilter').addEventListener('change', function() {
  currentFilter = this.value;
  filterResults();
});

function filterResults() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  const tbody = document.querySelector('#resultsTable tbody');
  tbody.innerHTML = '';

  if (!jsonData.length) return;

  let total = 0;
  let pending = 0;

  const results = jsonData.filter(item => {
    const trnsItem = trnsData.find(t => t.CARDNO === item.CARDNO);
    const status = trnsItem ? trnsItem.transaction_status : 'No';
    const isDone = status.toLowerCase() === 'done';

    total++;
    if (!isDone) pending++;

    // ✅ Apply filter
    if (currentFilter === 'done' && !isDone) return false;
    if (currentFilter === 'pending' && isDone) return false;

    return item.CARDNO.toLowerCase().includes(query) ||
           item['HEAD OF THE FAMILY'].toLowerCase().includes(query) ||
           status.toLowerCase().includes(query);
  });

  document.getElementById('totalCards').textContent = total;
  document.getElementById('pendingCards').textContent = pending;

  if (!results.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="text-center">No results found.</td></tr>';
  } else {
    results.forEach(item => {
      const trnsItem = trnsData.find(t => t.CARDNO === item.CARDNO);
      const status = trnsItem ? trnsItem.transaction_status : 'No';
      const color = status.toLowerCase() === 'done' ? 'green' : 'red';

      const row = document.createElement('tr');
      row.innerHTML = `
        <td><a href="https://aepos.ap.gov.in/Qcodesearch.jsp?rcno=${item.CARDNO}" target="_blank">${item.CARDNO}</a></td>
        <td>${item['HEAD OF THE FAMILY']}</td>
        <td>${item.UNITS}</td>
        <td style="color:${color}; font-weight:bold;">${status}</td>
      `;
      tbody.appendChild(row);
    });
  }

  document.getElementById('resultsTable').style.display = 'table';
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
