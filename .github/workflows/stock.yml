name: RC stock

on:
  workflow_dispatch:

jobs:
  run-check:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run script
        run: python stock_fetch.py

      - name: Commit JSON
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "pothabattulavinod"
          git config --global user.email "vinodyadavpothabattula666@gmail.com"

          git add stock_current.json

          if ! git diff-index --quiet HEAD; then
            git commit -m "Update FPS stock data"
          fi

          git remote remove origin
          git remote add origin https://x-access-token:${GH_PAT}@github.com/pothabattulavinod/rcklv.git

          git push origin HEAD:main
