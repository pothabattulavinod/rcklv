<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rajanagaram eKYC Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Arial,sans-serif;background:#f4f7fb;color:#1e293b}
.header{background:linear-gradient(135deg,#0f172a,#2563eb);color:#fff;padding:30px;text-align:center}
.container{max-width:1400px;margin:auto;padding:20px}
.stats,.shop-grid{display:grid;gap:20px}
.stats{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:25px}
.shop-grid{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.card,.shop-card,.table-wrap{background:#fff;border-radius:18px;box-shadow:0 8px 25px rgba(0,0,0,.08)}
.card{padding:20px}
.value{font-size:32px;color:#2563eb;font-weight:700}
.shop-card{padding:22px;cursor:pointer;transition:.25s}
.shop-card:hover{transform:translateY(-6px)}
.icon{width:64px;height:64px;border-radius:16px;background:#2563eb;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px}
.shop-no{font-size:28px;font-weight:700;color:#2563eb;margin-top:12px}
.members{margin-top:10px;color:#64748b}
.btn{margin-top:15px;width:100%;padding:12px;border:none;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer}
#membersSection{display:none}
.topbar{display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap;margin-bottom:15px}
input{padding:12px;border:1px solid #ddd;border-radius:10px;min-width:280px}
.back{padding:12px 18px;border:none;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse}
th{background:#2563eb;color:#fff}
th,td{padding:12px;text-align:left}
tr:nth-child(even){background:#f8fafc}
a{color:#2563eb;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="header"><h1><i class="fa-solid fa-fingerprint"></i> Rajanagaram eKYC Dashboard</h1></div>
<div class="container">
<div id="dashboard">
<div class="stats">
<div class="card"><div>Total Shops</div><div class="value" id="shopCount">0</div></div>
<div class="card"><div>Total Members</div><div class="value" id="memberCount">0</div></div>
</div>
<div id="shopGrid" class="shop-grid"></div>
</div>

<div id="membersSection">
<div class="topbar">
<button class="back" onclick="showDashboard()">← Dashboard</button>
<input id="search" placeholder="Search Rice Card or Name" onkeyup="filterTable()">
</div>
<h2 id="shopTitle"></h2><br>
<div class="table-wrap">
<table>
<thead><tr><th>Rice Card No</th><th>Name</th><th>Age</th><th>Address</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
</div>

<script>
const shopFiles=[
"https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/ekyc0428010.json",
"https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/ekyc0428011.json",
"https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/ekyc0428012.json",
"https://raw.githubusercontent.com/pothabattulavinod/rcklv/refs/heads/main/ekyc0428040.json"
];

let currentData=[];

async function loadDashboard(){
 let total=0;
 const grid=document.getElementById('shopGrid');
 grid.innerHTML='';

 for(const file of shopFiles){
   try{
     const data=await fetch(file).then(r=>r.json());
     if(!data.length) continue;
     total+=data.length;
     const shopNo=data[0].shop_no || file.replace('ekyc','').replace('.json','');
     grid.innerHTML += `
      <div class="shop-card" onclick="loadShop('${file}')">
       <div class="icon"><i class="fa-solid fa-store"></i></div>
       <div class="shop-no">${shopNo}</div>
       <div class="members">${data.length} Members</div>
       <button class="btn">View Members</button>
      </div>`;
   }catch(e){console.error(e)}
 }
 document.getElementById('shopCount').innerText=shopFiles.length;
 document.getElementById('memberCount').innerText=total;
}

async function loadShop(file){
 document.getElementById('dashboard').style.display='none';
 document.getElementById('membersSection').style.display='block';
 currentData=await fetch(file).then(r=>r.json());
 document.getElementById('shopTitle').innerText='Shop '+(currentData[0]?.shop_no || '');
 renderTable(currentData);
}

function renderTable(data){
 document.getElementById('tbody').innerHTML=data.map(r=>`
 <tr>
 <td><a target="_blank" href="https://aepos.ap.gov.in/smartepos/Qcodesearch.jsp?rcno=${r.rice_card_no}">${r.rice_card_no}</a></td>
 <td>${r.member_name||''}</td>
 <td>${r.age ?? 'NA'}</td>
 <td>${r.address||''}</td>
 </tr>`).join('');
}

function filterTable(){
 const q=document.getElementById('search').value.toLowerCase();
 renderTable(currentData.filter(r=>
 String(r.rice_card_no).includes(q) ||
 String(r.member_name).toLowerCase().includes(q)
 ));
}

function showDashboard(){
 document.getElementById('membersSection').style.display='none';
 document.getElementById('dashboard').style.display='block';
}

loadDashboard();
</script>
</body>
</html>
