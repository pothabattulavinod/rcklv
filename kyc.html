<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rajanagaram eKYC Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f7fc;
color:#1e293b;
}

.header{
background:linear-gradient(135deg,#0f172a,#2563eb);
color:white;
padding:35px;
text-align:center;
}

.header h1{
font-size:32px;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.stat-card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.stat-title{
color:#64748b;
font-size:14px;
}

.stat-value{
font-size:34px;
font-weight:700;
color:#2563eb;
margin-top:10px;
}

.shop-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:25px;
}

.shop-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
cursor:pointer;
transition:.3s;
}

.shop-card:hover{
transform:translateY(-5px);
}

.shop-icon{
width:70px;
height:70px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
}

.shop-number{
font-size:28px;
font-weight:700;
color:#1d4ed8;
margin-top:15px;
}

.shop-members{
margin-top:10px;
color:#64748b;
}

.view-btn{
width:100%;
padding:12px;
margin-top:18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:15px;
}

#membersSection{
display:none;
}

.topbar{
display:flex;
justify-content:space-between;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.back-btn{
border:none;
background:#2563eb;
color:white;
padding:12px 18px;
border-radius:10px;
cursor:pointer;
}

.search{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
width:350px;
max-width:100%;
}

.table-wrapper{
background:white;
border-radius:18px;
overflow-x:auto;
-webkit-overflow-scrolling:touch;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

table{
width:100%;
border-collapse:collapse;
table-layout:fixed;
}

th{
background:#2563eb;
color:white;
padding:12px;
font-size:14px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
font-size:13px;
word-wrap:break-word;
}

tr:hover{
background:#f8fbff;
}

.rice-link{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

.badge{
padding:4px 10px;
border-radius:15px;
font-size:12px;
}

.child{
background:#dcfce7;
color:#166534;
}

.adult{
background:#dbeafe;
color:#1e40af;
}

.na{
background:#f1f5f9;
color:#475569;
}

</style>
</head>

<body>

<div class="header">
<h1>
<i class="fa-solid fa-fingerprint"></i>
eKYC Dashboard
</h1>
</div>

<div class="container">

<div id="dashboard">

<div class="stats">

<div class="stat-card">
<div class="stat-title">Total Shops</div>
<div class="stat-value" id="shopCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Total Members</div>
<div class="stat-value" id="memberCount">0</div>
</div>

</div>

<div id="shopGrid" class="shop-grid"></div>

</div>

<div id="membersSection">

<div class="topbar">

<button class="back-btn" onclick="showDashboard()">
← Dashboard
</button>

<input class="search"
id="search"
placeholder="Search Rice Card No or Name"
onkeyup="filterTable()">

</div>

<h2 id="shopTitle"></h2>

<br>

<div class="table-wrapper">

<table>

<thead>
<tr>
<th>S.No</th>
<th>Rice Card No</th>
<th>Name</th>
<th>Age</th>
<th>Address</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<script>

const shopFiles = [
"/ekyc0428010.json",
"/ekyc0428011.json",
"/ekyc0428012.json",
"/ekyc0428040.json"
];

let currentData = [];

async function loadDashboard(){

let totalMembers = 0;
let loadedShops = 0;

const grid = document.getElementById("shopGrid");
grid.innerHTML = "";

for(const file of shopFiles){

try{

const response = await fetch(file + "?v=" + Date.now(), {
cache:"no-store"
});

if(!response.ok) throw new Error(file);

const data = await response.json();

if(!data || !data.length) continue;

loadedShops++;
totalMembers += data.length;

const shopNo =
data[0].shop_no ||
file.replace("/ekyc","").replace(".json","");

grid.innerHTML += `
<div class="shop-card"
onclick="loadShop('${file}')">

<div class="shop-icon">
<i class="fa-solid fa-store"></i>
</div>

<div class="shop-number">
${shopNo}
</div>

<div class="shop-members">
${data.length} Members
</div>

<button class="view-btn">
View Members
</button>

</div>
`;

}
catch(err){
console.error(err);
}
}

document.getElementById("shopCount").innerText = loadedShops;
document.getElementById("memberCount").innerText = totalMembers;

}

async function loadShop(file){

document.getElementById("dashboard").style.display = "none";
document.getElementById("membersSection").style.display = "block";

const response = await fetch(file + "?v=" + Date.now(), {
cache:"no-store"
});

currentData = await response.json();

document.getElementById("shopTitle").innerText =
"Shop " + (currentData[0].shop_no || "");

renderTable(currentData);
}

function renderTable(data){

const grouped = {};

data.forEach(row => {

const rc = row.rice_card_no;

if(!grouped[rc]){
grouped[rc] = [];
}

grouped[rc].push(row);

});

let html = "";
let slNo = 1;

Object.entries(grouped)
.sort((a,b)=>a[0].localeCompare(b[0]))
.forEach(([rc,members]) => {

if(members.length > 1){

html += `
<tr style="background:#dbeafe;">
<td colspan="5">
<strong>
👨‍👩‍👧‍👦 ${rc} (${members.length} Members)
</strong>
</td>
</tr>
`;
}

members.forEach(row => {

html += `
<tr>

<td>${slNo++}</td>

<td>
<a class="rice-link"
target="_blank"
href="https://aepos.ap.gov.in/smartepos/Qcodesearch.jsp?rcno=${row.rice_card_no}">
${row.rice_card_no}
</a>
</td>

<td>${row.member_name || "-"}</td>

<td>
${
(row.age === null || row.age === undefined)
? '<span class="badge na">NA</span>'
: row.age < 18
? `<span class="badge child">${row.age}</span>`
: `<span class="badge adult">${row.age}</span>`
}
</td>

<td>${row.address || "-"}</td>

</tr>
`;

});

});

document.getElementById("tbody").innerHTML = html;
}

function filterTable(){

const keyword =
document.getElementById("search").value.toLowerCase();

const filtered =
currentData.filter(row =>
String(row.rice_card_no).toLowerCase().includes(keyword) ||
String(row.member_name || "").toLowerCase().includes(keyword)
);

renderTable(filtered);
}

function showDashboard(){
document.getElementById("membersSection").style.display = "none";
document.getElementById("dashboard").style.display = "block";
}

loadDashboard();

</script>

</body>
</html>
